name: nextcloud-aio-cursoteca

services:
  # Nextcloud AIO Master Container
  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    
    # Persistent Volumes
    volumes:
      # AIO Config
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      # Docker socket for container orchestration
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Storage directory (for academic material)
      - /mnt/nextcloud_storage:/mnt/ncdata
      # Local backups
      - /mnt/nextcloud_backups:/mnt/backup
    
    # Network configuration
    network_mode: bridge
    ports:
      - "80:80"      # HTTP (Nextcloud)
      - "8080:8080"  # AIO Interface (self-signed HTTPS)
      - "8443:8443"  # AIO Interface (HTTPS with Let's Encrypt if domain is available)
      - "3478:3478/tcp"  # Talk (communication)
      - "3478:3478/udp"  # Talk
    
    # Environment variables configuration
    environment:
      # Domain (replace with real domain)
      # NEXTCLOUD_DOMAIN: hola.com
      
      # Nextcloud data storage location (WARNING: do not change after installation)
      NEXTCLOUD_DATADIR: /mnt/ncdata
      
      # Upload limits
      NEXTCLOUD_UPLOAD_LIMIT: 10G
      NEXTCLOUD_MAX_TIME: 3600
      NEXTCLOUD_MEMORY_LIMIT: 512M
      
      # Apps to install at first startup
      # (uncomment the ones you need)
      NEXTCLOUD_STARTUP_APPS: deck twofactor_totp tasks calendar contacts notes
      
      # Backup retention policy (Borg)
      BORG_RETENTION_POLICY: "--keep-within=7d --keep-weekly=4 --keep-monthly=6"
      
      # Docker socket for mastercontainer updates
      WATCHTOWER_DOCKER_SOCKET_PATH: /var/run/docker.sock
      
      # Enable support for custom CA certificates (if needed)
      # NEXTCLOUD_TRUSTED_CACERTS_DIR: /path/to/cacerts
      
      # If running behind a reverse proxy (nginx, Caddy)
      # APACHE_PORT: 11000
      # APACHE_IP_BINDING: 127.0.0.1

# Persistent volumes
volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/nextcloud-aio-config