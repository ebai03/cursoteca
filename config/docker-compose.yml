services:
  # 1. THE FRONTEND: CADDY
  caddy:
    image: caddy:2-alpine
    container_name: cursoteca_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend:/var/www/frontend        # Static HTML pages + stats.json (read-only)
      - ../data:/var/www/cursos:ro     # Course files (read-only for Caddy)
      - ./scripts:/scripts:ro           # Stats update script (read-only)
      - /var/log/caddy:/var/log/caddy # Caddy logs
    entrypoint: |
      /bin/sh -c '
      # Install cron and necessary tools
      apk add --no-cache dcron bc grep bash
      
      # Log dir
      mkdir -p /var/log/cursoteca

      # Execute the stats update script once at startup to ensure stats.json is created
      bash /scripts/update-stats.sh
      
      # Cron job to update stats every 30 minutes
      echo "*/30 * * * * bash /scripts/update-stats.sh >> /var/log/cursoteca/cron.log 2>&1" | crontab -
      
      # Init cron in the background
      crond -f -l 2 &
      
      # Init Caddy
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      '
    
  # 2. THE BACKEND: FILEBROWSER (For Admins/Professors)
  filebrowser:
    image: filebrowser/filebrowser:s6 # See why: https://github.com/filebrowser/filebrowser/issues/5256
    container_name: cursoteca_admin
    restart: unless-stopped
    ports:
      - "8080:80" # Access the admin panel at port 8080
    volumes:
      - ../data:/srv # FileBrowser manages the EXACT same folder
      - ./filebrowser.db:/database/filebrowser.db
      - ./filebrowse_config:/config
